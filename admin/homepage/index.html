<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Homepage CMS | ME MARS FAMILY Admin</title>

    <link rel="stylesheet" href="../admin.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../../lib/supabase-config.js" defer></script>
    <script src="../../lib/supabase-client.js" defer></script>
    <script src="../auth.js" defer></script>
    <script src="../admin-shared.js" defer></script>
    <script src="homepage.js" defer></script>
</head>

<body>
    <div class="admin-shell">
        <header class="admin-header">
            <nav class="admin-nav container">
                <a class="brand" href="/admin/">
                    <img
                        class="brand-logo"
                        src="../../assets/me-mars-family-logo.jpg"
                        alt="ME MARS FAMILY logo"
                    >
                    <span>ME MARS FAMILY Admin</span>
                </a>

                <div class="admin-links">
                    <a href="/admin/">Dashboard</a>
                    <a href="/admin/media/">Media</a>
                    <a href="/admin/news/">News</a>
                    <a href="/admin/reports/">Reports</a>

                    <span
                        data-admin-role
                        class="admin-user-role"
                    >
                        Loading...
                    </span>

                    <a data-logout href="#logout">Logout</a>
                </div>
            </nav>
        </header>

        <main class="admin-main container">
            <div data-page-message></div>

            <section class="page-heading">
                <div>
                    <p class="eyebrow">Phase 7</p>

                    <h1>Homepage CMS</h1>

                    <p>
                        Update hero copy, calls to action, impact statistics,
                        partner logos, and testimonials without code.
                    </p>
                </div>
            </section>

            <!-- Homepage Settings -->
            <section class="form-card">
                <form class="form-grid" data-home-form>
                    <label>
                        Hero Title
                        <input name="hero_title" required>
                    </label>

                    <label>
                        Hero Subtitle
                        <input name="hero_subtitle">
                    </label>

                    <label>
                        Hero Intro
                        <textarea
                            name="hero_intro"
                            rows="4"
                        ></textarea>
                    </label>

                    <div class="form-row two">
                        <label>
                            Primary CTA Label
                            <input name="primary_cta_label">
                        </label>

                        <label>
                            Primary CTA URL
                            <input name="primary_cta_url">
                        </label>
                    </div>

                    <div class="form-row two">
                        <label>
                            Secondary CTA Label
                            <input name="secondary_cta_label">
                        </label>

                        <label>
                            Secondary CTA URL
                            <input name="secondary_cta_url">
                        </label>
                    </div>

                    <button class="btn btn-primary">
                        Save Homepage
                    </button>
                </form>
            </section>

            <!-- CMS Content Management -->
            <section
                class="dashboard-grid"
                style="margin-top: 24px;"
            >
                <!-- Impact Statistics -->
                <article class="admin-card">
                    <h2>Impact Statistic</h2>

                    <form class="form-grid" data-stat-form>
                        <input
                            name="value"
                            placeholder="Value"
                            required
                        >

                        <input
                            name="label"
                            placeholder="Label"
                            required
                        >

                        <input
                            name="description"
                            placeholder="Description"
                        >

                        <input
                            name="sort_order"
                            type="number"
                            value="0"
                        >

                        <label class="checkbox-row">
                            <input
                                name="featured"
                                type="checkbox"
                                checked
                            >
                            Featured
                        </label>

                        <button class="btn btn-secondary">
                            Add Statistic
                        </button>
                    </form>
                </article>

                <!-- Partners -->
                <article class="admin-card">
                    <h2>Partner</h2>

                    <form class="form-grid" data-partner-form>
                        <input
                            name="name"
                            placeholder="Partner name"
                            required
                        >

                        <input
                            name="website_url"
                            placeholder="Website URL"
                        >

                        <input
                            name="alt_text"
                            placeholder="Logo alt text"
                        >

                        <input
                            name="sort_order"
                            type="number"
                            value="0"
                        >

                        <button class="btn btn-secondary">
                            Add Partner
                        </button>
                    </form>
                </article>

                <!-- Testimonials -->
                <article class="admin-card">
                    <h2>Testimonial</h2>

                    <form class="form-grid" data-testimonial-form>
                        <textarea
                            name="quote"
                            placeholder="Quote"
                            required
                        ></textarea>

                        <input
                            name="attribution"
                            placeholder="Attribution"
                        >

                        <input
                            name="role_or_context"
                            placeholder="Role/context"
                        >

                        <label class="checkbox-row">
                            <input
                                name="consent_confirmed"
                                type="checkbox"
                                checked
                            >
                            Consent confirmed
                        </label>

                        <button class="btn btn-secondary">
                            Add Testimonial
                        </button>
                    </form>
                </article>

                <!-- Current Items -->
                <article class="admin-card">
                    <h2>Current Items</h2>
                    <div data-home-lists></div>
                </article>
            </section>
        </main>
    </div>
</body>
</html>
